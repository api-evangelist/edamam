specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Edamam
providerId: edamam
created: '2026-05-04'
modified: '2026-06-02'
reconciled: true
tags:
  - Food
  - Nutrition
  - Recipes
  - UPC
description: >-
  Edamam prices its API surface (Food and Grocery Database, Nutrition Analysis,
  Recipe Search, Meal Planner) through prepaid monthly "Enterprise" tiers plus a
  custom Unlimited tier. Each tier sets a monthly call quota, per-category rate
  limits (requests per minute), and data-caching permissions; Vision API calls
  are bundled or billed pay-as-you-go depending on tier. Pricing below reflects
  the Food and Grocery Database API plans page; other Edamam APIs follow the
  same tier structure with product-specific quotas.
sources:
  - https://developer.edamam.com/food-database-api
  - https://developer.edamam.com/edamam-nutrition-api
  - https://developer.edamam.com/edamam-recipe-api
  - https://developer.edamam.com/meal-planner-api
plans:
  - id: edamam-enterprise-basic
    name: Enterprise Basic
    type: subscription
    description: Entry prepaid tier with a 30-day trial, 100,000 calls/month, and limited data caching.
    entries:
      - label: Monthly Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$14'
        userMultiplied: false
      - label: API Call Quota
        name: api_requests
        type: quota
        metric: request
        limit: 100000
        timeFrame: month
        geo: global
        unit: 1
        price: '$14'
        userMultiplied: false
      - label: Rate Limit (Food/Nutrition/UPC)
        name: rate_limit
        type: quota
        metric: requests_per_minute
        limit: 50
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Vision API Calls
        name: vision_calls
        type: quota
        metric: request
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: 30-Day Trial
      - name: Data Caching (FoodId, Food Label only)
      - name: Edamam Nutrition Analysis API
      - name: Edamam Food and Grocery Database API
      - name: Edamam Recipe Search API
      - name: Edamam Meal Planner API
  - id: edamam-enterprise-core
    name: Enterprise Core
    type: subscription
    description: Mid prepaid tier with 750,000 calls/month, higher rate limits, and enhanced caching.
    entries:
      - label: Monthly Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$69'
        userMultiplied: false
      - label: API Call Quota
        name: api_requests
        type: quota
        metric: request
        limit: 750000
        timeFrame: month
        geo: global
        unit: 1
        price: '$69'
        userMultiplied: false
      - label: Rate Limit (Food/Nutrition/UPC)
        name: rate_limit
        type: quota
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Vision API Calls
        name: vision_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0.015'
        userMultiplied: false
    elements:
      - name: Enhanced Caching (Protein, Net Carbs, Total Fat, Kcal)
      - name: Edamam Nutrition Analysis API
      - name: Edamam Food and Grocery Database API
      - name: Edamam Recipe Search API
      - name: Edamam Meal Planner API
  - id: edamam-enterprise-plus
    name: Enterprise Plus
    type: subscription
    description: High-volume prepaid tier with 5,000,000 calls/month, 300 req/min, and full nutrient caching.
    entries:
      - label: Monthly Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$299'
        userMultiplied: false
      - label: API Call Quota
        name: api_requests
        type: quota
        metric: request
        limit: 5000000
        timeFrame: month
        geo: global
        unit: 1
        price: '$299'
        userMultiplied: false
      - label: Rate Limit (All Categories)
        name: rate_limit
        type: quota
        metric: requests_per_minute
        limit: 300
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Vision API Calls
        name: vision_calls
        type: quota
        metric: request
        limit: 10000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Full Nutrient Caching Permitted
      - name: Edamam Nutrition Analysis API
      - name: Edamam Food and Grocery Database API
      - name: Edamam Recipe Search API
      - name: Edamam Meal Planner API
  - id: edamam-enterprise-unlimited
    name: Enterprise Unlimited
    type: enterprise
    description: Custom-priced tier with unlimited monthly quota and rate, negotiated terms, and a credit card on file.
    entries:
      - label: Monthly Subscription
        name: subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
      - label: API Call Quota
        name: api_requests
        type: quota
        metric: request
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
      - label: Vision API Calls
        name: vision_calls
        type: metered
        metric: request
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: '$0.01'
        userMultiplied: false
    elements:
      - name: Unlimited Quota
      - name: Unlimited Rate
      - name: Custom Pricing
      - name: Edamam Nutrition Analysis API
      - name: Edamam Food and Grocery Database API
      - name: Edamam Recipe Search API
      - name: Edamam Meal Planner API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
