naftiko: "1.0.0-alpha2"

info:
  label: "Edamam Food and Grocery Database API — Food Database"
  description: >-
    Food Database — Food Database. 2 operations. Lead operation: Edamam Search
    Foods by Keyword or Barcode. Search close to 900,000 foods and 680,000
    UPC/barcode entries, then resolve full nutrition for a selected food,
    quantity, and measure. Self-contained Naftiko capability covering one
    Edamam business surface.
  tags:
    - Edamam
    - Food Database
    - Nutrition
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      EDAMAM_APP_ID: EDAMAM_APP_ID
      EDAMAM_APP_KEY: EDAMAM_APP_KEY

capability:

  consumes:
    - type: http
      namespace: "food-and-grocery-database-api-food-database"
      baseUri: "https://api.edamam.com"
      description: "Edamam Food and Grocery Database API — Food Database business capability. Self-contained, no shared references."
      authentication:
        type: apikey
        key: app_key
        value: "{{env.EDAMAM_APP_KEY}}"
        placement: query
      resources:
        - name: "food-database-parser"
          path: "/api/food-database/v2/parser"
          operations:
            - name: "parseFood"
              method: GET
              description: "Edamam Search Foods by Keyword or Barcode"
              inputParameters:
                - name: "app_id"
                  in: query
                  type: string
                  required: true
                  description: "Application identifier from the Edamam developer dashboard."
                - name: "ingr"
                  in: query
                  type: string
                  required: false
                  description: "Food keyword or name to search for."
                - name: "upc"
                  in: query
                  type: string
                  required: false
                  description: "UPC/EAN barcode to look up."
                - name: "category"
                  in: query
                  type: string
                  required: false
                  description: "Filter results by food category."
                - name: "categoryLabel"
                  in: query
                  type: string
                  required: false
                  description: "Broader category filter (food or meal)."
                - name: "nutrition-type"
                  in: query
                  type: string
                  required: false
                  description: "Nutrient profile to apply to returned foods."
                - name: "health"
                  in: query
                  type: string
                  required: false
                  description: "Health label filter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "food-database-nutrients"
          path: "/api/food-database/v2/nutrients"
          operations:
            - name: "foodNutrients"
              method: POST
              description: "Edamam Resolve Nutrients for Selected Foods"
              inputParameters:
                - name: "app_id"
                  in: query
                  type: string
                  required: true
                  description: "Application identifier from the Edamam developer dashboard."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Ingredients with foodId, quantity, and measureURI."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "food-and-grocery-database-api-food-database-rest"
      port: 8080
      description: "REST adapter for Edamam Food and Grocery Database API — Food Database. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/food-database/v2/parser"
          name: "food-database-parser"
          description: "REST surface for food and barcode search."
          operations:
            - method: GET
              name: "parseFood"
              description: "Edamam Search Foods by Keyword or Barcode"
              call: "food-and-grocery-database-api-food-database.parseFood"
              with:
                "app_id": "rest.app_id"
                "ingr": "rest.ingr"
                "upc": "rest.upc"
                "category": "rest.category"
                "categoryLabel": "rest.categoryLabel"
                "nutrition-type": "rest.nutrition-type"
                "health": "rest.health"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/food-database/v2/nutrients"
          name: "food-database-nutrients"
          description: "REST surface for resolving nutrients for selected foods."
          operations:
            - method: POST
              name: "foodNutrients"
              description: "Edamam Resolve Nutrients for Selected Foods"
              call: "food-and-grocery-database-api-food-database.foodNutrients"
              with:
                "app_id": "rest.app_id"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "food-and-grocery-database-api-food-database-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Edamam Food and Grocery Database API — Food Database. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "search-foods"
          description: "Edamam Search Foods by Keyword or Barcode"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "food-and-grocery-database-api-food-database.parseFood"
          with:
            "app_id": "tools.app_id"
            "ingr": "tools.ingr"
            "upc": "tools.upc"
            "category": "tools.category"
            "categoryLabel": "tools.categoryLabel"
            "nutrition-type": "tools.nutrition-type"
            "health": "tools.health"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "resolve-food-nutrients"
          description: "Edamam Resolve Nutrients for Selected Foods"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "food-and-grocery-database-api-food-database.foodNutrients"
          with:
            "app_id": "tools.app_id"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
