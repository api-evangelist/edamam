naftiko: "1.0.0-alpha2"

info:
  label: "Edamam Meal Planner API — Meal Planner"
  description: >-
    Meal Planner — Meal Planner. 1 operation. Lead operation: Edamam Generate
    Meal Plan. Generate a multi-day, multi-section meal plan constrained by
    health labels, diet labels, and nutrient ranges at both the plan and
    per-section level. Self-contained Naftiko capability covering one Edamam
    business surface.
  tags:
    - Edamam
    - Meal Planner
    - Nutrition
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      EDAMAM_APP_ID: EDAMAM_APP_ID
      EDAMAM_APP_KEY: EDAMAM_APP_KEY

capability:

  consumes:
    - type: http
      namespace: "meal-planner-api-meal-planner"
      baseUri: "https://api.edamam.com"
      description: "Edamam Meal Planner API — Meal Planner business capability. Self-contained, no shared references."
      authentication:
        type: basic
        username: "{{env.EDAMAM_APP_ID}}"
        password: "{{env.EDAMAM_APP_KEY}}"
      resources:
        - name: "meal-planner-select"
          path: "/api/meal-planner/v1/{app_id}/select"
          operations:
            - name: "selectMealPlan"
              method: POST
              description: "Edamam Generate Meal Plan"
              inputParameters:
                - name: "app_id"
                  in: path
                  type: string
                  required: true
                  description: "Application identifier from the Edamam developer dashboard."
                - name: "Edamam-Account-User"
                  in: header
                  type: string
                  required: true
                  description: "Active user identifier for the meal plan request."
                - name: "body"
                  in: body
                  type: object
                  required: true
                  description: "Meal plan request with size, plan constraints, and meal sections."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "meal-planner-api-meal-planner-rest"
      port: 8080
      description: "REST adapter for Edamam Meal Planner API — Meal Planner. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/meal-planner/v1/{app-id}/select"
          name: "meal-planner-select"
          description: "REST surface for generating a meal plan."
          operations:
            - method: POST
              name: "selectMealPlan"
              description: "Edamam Generate Meal Plan"
              call: "meal-planner-api-meal-planner.selectMealPlan"
              with:
                "app_id": "rest.app_id"
                "Edamam-Account-User": "rest.Edamam-Account-User"
                "body": "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "meal-planner-api-meal-planner-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Edamam Meal Planner API — Meal Planner. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "generate-meal-plan"
          description: "Edamam Generate Meal Plan"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "meal-planner-api-meal-planner.selectMealPlan"
          with:
            "app_id": "tools.app_id"
            "Edamam-Account-User": "tools.Edamam-Account-User"
            "body": "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
