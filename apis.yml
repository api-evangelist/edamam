apis:
  - aid: edamam:edamam-nutrition-analysis-api
    name: Edamam Nutrition Analysis API
    description: >-
      The Edamam Nutrition Analysis API provides detailed nutrition data for
      recipes and food items. Send a recipe or food description and receive
      comprehensive nutritional information including calories, macros, and
      micronutrients.
    humanURL: https://developer.edamam.com/edamam-docs-nutrition-api
    baseURL: https://api.edamam.com
    tags:
      - Food
      - Health
      - Nutrition
    properties:
      - url: https://developer.edamam.com/edamam-docs-nutrition-api
        type: Documentation
      - url: https://developer.edamam.com/edamam-nutrition-api
        type: Pricing
  - aid: edamam:edamam-food-and-grocery-database-api
    name: Edamam Food and Grocery Database API
    description: >-
      The Edamam Food and Grocery Database API provides access to a database
      of close to 900,000 foods and over 680,000 unique UPC codes with
      full nutritional information.
    humanURL: https://developer.edamam.com/food-database-api-docs
    baseURL: https://api.edamam.com
    tags:
      - Food
      - Grocery
      - Nutrition
    properties:
      - url: https://developer.edamam.com/food-database-api-docs
        type: Documentation
      - url: https://developer.edamam.com/food-database-api
        type: Pricing
  - aid: edamam:edamam-recipe-search-api
    name: Edamam Recipe Search API
    description: >-
      The Edamam Recipe Search API provides access to over 2 million recipes
      with full nutritional analysis, diet and health labels, ingredient
      details, and cuisine type.
    humanURL: https://developer.edamam.com/edamam-docs-recipe-api
    baseURL: https://api.edamam.com
    tags:
      - Food
      - Nutrition
      - Recipes
    properties:
      - url: https://developer.edamam.com/edamam-docs-recipe-api
        type: Documentation
      - url: https://developer.edamam.com/edamam-recipe-api
        type: Pricing
  - aid: edamam:edamam-meal-planner-api
    name: Edamam Meal Planner API
    description: >-
      The Edamam Meal Planner API provides personalized meal planning
      capabilities based on dietary preferences, nutrition goals, and
      available ingredients.
    humanURL: https://developer.edamam.com/edamam-docs-meal-planner-api
    baseURL: https://api.edamam.com
    tags:
      - Food
      - Meal Planning
      - Nutrition
    properties:
      - url: https://developer.edamam.com/edamam-docs-meal-planner-api
