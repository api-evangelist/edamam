apis:
  - aid: edamam:edamam-nutrition-analysis-api
    name: Edamam Nutrition Analysis API
    description: >-
      The Edamam Nutrition Analysis API provides detailed nutrition data for recipes and food items. Send a recipe or
      food description and receive comprehensive nutritional information including calories, macros, and micronutrients.
    humanURL: https://developer.edamam.com/edamam-docs-nutrition-api
    baseURL: https://api.edamam.com
    tags:
      - Food
      - Health
      - Nutrition
    properties:
