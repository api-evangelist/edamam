        type: Pricing
      - url: https://raw.githubusercontent.com/api-evangelist/edamam/main/openapi/edamam-nutrition-analysis-api-openapi.yml
        type: OpenAPI
  - aid: edamam:edamam-food-and-grocery-database-api
    name: Edamam Food and Grocery Database API
    description: >-
      The Edamam Food and Grocery Database API provides access to a database of close to 900,000 foods and over 680,000
      unique UPC codes with full nutritional information.
    humanURL: https://developer.edamam.com/food-database-api-docs
    baseURL: https://api.edamam.com
    tags:
      - Food
      - Grocery
      - Nutrition
    properties:
      - url: https://developer.edamam.com/food-database-api-docs
        type: Documentation
      - url: https://developer.edamam.com/food-database-api
        type: Pricing
      - url: >-
          https://raw.githubusercontent.com/api-evangelist/edamam/main/openapi/edamam-food-and-grocery-database-api-openapi.yml
        type: OpenAPI
  - aid: edamam:edamam-recipe-search-api
    name: Edamam Recipe Search API
    description: >-
      The Edamam Recipe Search API provides access to over 2 million recipes with full nutritional analysis, diet and
      health labels, ingredient details, and cuisine type.
    humanURL: https://developer.edamam.com/edamam-docs-recipe-api
    baseURL: https://api.edamam.com
    tags:
      - Food
      - Nutrition
      - Recipes
    properties:
      - url: https://developer.edamam.com/edamam-docs-recipe-api
        type: Documentation
      - url: https://developer.edamam.com/edamam-recipe-api
        type: Pricing
      - url: https://raw.githubusercontent.com/api-evangelist/edamam/main/openapi/edamam-recipe-search-api-openapi.yml
        type: OpenAPI
  - aid: edamam:edamam-meal-planner-api
    name: Edamam Meal Planner API
    description: >-
      The Edamam Meal Planner API provides personalized meal planning capabilities based on dietary preferences,
      nutrition goals, and available ingredients.
    humanURL: https://developer.edamam.com/edamam-docs-meal-planner-api
