description: >-
  FOCUS-aligned FinOps for Edamam: prepaid monthly Enterprise subscription tiers
  (Basic / Core / Plus) that bundle a fixed call quota, plus pay-as-you-go Vision
  API metering and a custom Unlimited tier.
sources:
  - https://developer.edamam.com/food-database-api
  - https://developer.edamam.com/api/faq
  - https://developer.edamam.com/buyer/stats
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Tiered Subscription + Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Edamam
  ServiceCategory: Developer Tools / API
  ProviderName: Edamam
  PublisherName: Edamam
  InvoiceIssuerName: Edamam
  PricingCategory: Tiered Subscription + Pay-As-You-Go
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Purchase
principles:
  - name: Visibility
    description: >-
      Track consumption against the active plan's monthly call quota and
      per-minute rate ceilings from the Edamam buyer usage stats dashboard
      (developer.edamam.com/buyer/stats).
  - name: Allocation
    description: >-
      Attribute spend by issuing a distinct app_id / app_key per consuming
      application or environment, and by passing the Edamam-Account-User header
      to break usage down per end user where active-user tracking is enabled.
  - name: Optimization
    description: >-
      Right-size the prepaid tier (Basic / Core / Plus) against forecast monthly
      call volume, cache permitted nutrient fields per the tier's caching rights
      to cut repeat calls, and batch ingredient resolution to stay under
      per-minute ceilings rather than over-provisioning.
  - name: Accountability
    description: >-
      Assign a budget owner per app_key, alert before the monthly quota is
      exhausted, and review tier fit at each renewal since quotas are prepaid
      and do not roll over.
meters:
  - name: api_requests
    description: Count of billable API requests against the plan's monthly quota.
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - category
      - consumer
  - name: vision_calls
    description: Vision API image-analysis calls, bundled or metered pay-as-you-go by tier.
    unit: request
    aggregation: sum
    dimensions:
      - tier
      - consumer
  - name: subscription_months
    description: Recurring prepaid monthly subscription charge for the active Enterprise tier.
    unit: month
    aggregation: sum
    dimensions:
      - tier
